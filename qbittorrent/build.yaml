##
## Build configuration for the qBittorrent add-on
## Based on the official linuxserver image
##

build_from:
  aarch64: "lscr.io/linuxserver/qbittorrent:arm64v8-latest"
  amd64: "lscr.io/linuxserver/qbittorrent:amd64-latest"
  armhf: "lscr.io/linuxserver/qbittorrent:arm32v7-latest"
  armv7: "lscr.io/linuxserver/qbittorrent:arm32v7-latest"

squash: false

labels:
  org.opencontainers.image.title: "Home Assistant Add-on: qBittorrent"
  org.opencontainers.image.description: "qBittorrent torrent client based on linuxserver"
  org.opencontainers.image.source: "https://github.com/qbittorrent/qBittorrent"
  org.opencontainers.image.licenses: "MIT"
