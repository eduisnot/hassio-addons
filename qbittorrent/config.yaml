name: "qBittorrent"
version: "1.0.0"
slug: "qbittorrent"
description: "qBittorrent torrent client with WebUI, based on the official linuxserver image."
url: "https://github.com/qbittorrent/qBittorrent"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

# Pull the pre-built linuxserver image directly — no local Docker build required.
image: "lscr.io/linuxserver/qbittorrent"

init: false
startup: "application"
boot: "auto"

ports:
  8080/tcp: 8080
  6881/tcp: 6881
  6881/udp: 6881
ports_description:
  8080/tcp: "qBittorrent WebUI"
  6881/tcp: "Torrenting (TCP)"
  6881/udp: "Torrenting (UDP)"

webui: "http://[HOST]:[PORT:8080]"

ingress: true
ingress_port: 8080

map:
  - share:rw
  - media:rw

options:
  WEBUI_PORT: 8080
  TORRENTING_PORT: 6881
  PUID: 1000
  PGID: 1000
  TZ: "Europe/Madrid"
  media_folders:
    - /media/multimedia/downloads
    - /media/multimedia/Movies
  cpu_percent: 80
  memory_mb: 512

schema:
  WEBUI_PORT: int
  TORRENTING_PORT: int
  PUID: int
  PGID: int
  TZ: str
  media_folders:
    - str
  cpu_percent: int
  memory_mb: int

environment:
  PUID: "{{PUID}}"
  PGID: "{{PGID}}"
  TZ: "{{TZ}}"
  WEBUI_PORT: "{{WEBUI_PORT}}"
  TORRENTING_PORT: "{{TORRENTING_PORT}}"

panel_icon: "mdi:cloud-download"
