name: "qBittorrent"
version: "1.0.0"
slug: "qbittorrent"
description: "qBittorrent torrent client with WebUI, based on the official linuxserver image."
url: "https://github.com/qbittorrent/qBittorrent"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
init: false
startup: "application"
boot: "auto"

# Ports
ports:
  8080/tcp: 8080
  6881/tcp: 6881
  6881/udp: 6881
ports_description:
  8080/tcp: "qBittorrent WebUI"
  6881/tcp: "Torrenting (TCP)"
  6881/udp: "Torrenting (UDP)"

# WebUI link shown in the add-on info page
webui: "http://[HOST]:[PORT:8080]"

# Ingress (access via HA sidebar)
ingress: true
ingress_port: 8080

# HA volume mounts — share and media cover all configurable paths
map:
  - share:rw
  - media:rw

# User-configurable options (visible in Supervisor → qBittorrent → Configuration)
options:
  WEBUI_PORT: 8080
  TORRENTING_PORT: 6881
  PUID: 1000
  PGID: 1000
  TZ: "Europe/Madrid"
  media_folders:
    - /media/multimedia/downloads
    - /media/multimedia/Movies

schema:
  WEBUI_PORT: int
  TORRENTING_PORT: int
  PUID: int
  PGID: int
  TZ: str
  media_folders:
    - str

# Environment variables forwarded to the container
environment:
  PUID: "{{PUID}}"
  PGID: "{{PGID}}"
  TZ: "{{TZ}}"
  WEBUI_PORT: "{{WEBUI_PORT}}"
  TORRENTING_PORT: "{{TORRENTING_PORT}}"
  
# Resource limits (optional)
cpu_limit: 2.0
memory_limit: 1536mb

panel_icon: "mdi:cloud-download"
