name: "qBittorrent"
version: "latest"
slug: "qbittorrent"
description: "qBittorrent torrent client with WebUI, based on the official linuxserver image."
url: "https://github.com/qbittorrent/qBittorrent"

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

init: false
startup: "application"
boot: "auto"

ports:
  8080/tcp: null
  6881/tcp: null
  6881/udp: null
ports_description:
  8080/tcp: "qBittorrent WebUI"
  6881/tcp: "Torrenting (TCP)"
  6881/udp: "Torrenting (UDP)"

webui: "http://[HOST]:[PORT:8080]"

map:
  - share:rw
  - media:rw

options:
  WEBUI_PORT: 8080
  TORRENTING_PORT: 6881
  PUID: 1000
  PGID: 1000
  TZ: "Europe/Madrid"
  cpu_percent: 50
  memory_mb: 1024
  media_folders:
    - /media/multimedia/downloads
    - /media/multimedia/Movies

schema:
  WEBUI_PORT: port
  TORRENTING_PORT: port
  PUID: int
  PGID: int
  TZ: str
  cpu_percent: int(1,400)
  memory_mb: int(128,)
  media_folders:
    - str

cpus: "{{ (cpu_percent | int(50)) / 100 }}"
memory: "{{ memory_mb | int(1024) }}M"

panel_icon: "mdi:cloud-download"
